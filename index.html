<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Xi Rong Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

  <!-- ── Google Analytics 4 ─────────────────────────────────────
       Swap GA_ID to point at a different GA4 property. Leave it blank
       ("") to disable analytics entirely. -->
  <script>
    window.GA_ID = "G-16F3PRWRP6";
    (function (id) {
      if (!id || id.indexOf("G-") !== 0) return;
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () { dataLayer.push(arguments); };
      gtag("js", new Date());
      gtag("config", id);
      var s = document.createElement("script");
      s.async = true;
      s.src = "https://www.googletagmanager.com/gtag/js?id=" + id;
      document.head.appendChild(s);
    })(window.GA_ID);
  </script>

  <style>
    :root {
      /* How many viewport-heights of scrolling drive the full video.
         Higher = slower, more deliberate scrub. */
      --scroll-length: 4;
      --accent: #4fd1c5;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Tall spacer that creates the scrollable runway. */
    #scroll-track {
      position: relative;
      height: calc(var(--scroll-length) * 100vh);
    }

    /* The sticky stage pins the video to the viewport while we scroll. */
    #stage {
      position: sticky;
      top: 0;
      height: 100vh;
      height: 100svh; /* respects mobile browser chrome */
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scrub-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    /* Progress bar pinned to the top of the viewport. */
    #progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.12);
      z-index: 20;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      transition: width 0.05s linear;
    }

    /* Hint that nudges the user to scroll; fades out once they do. */
    #hint {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
      font-size: 14px;
      letter-spacing: 0.04em;
      z-index: 20;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    #hint.hidden { opacity: 0; }

    /* Loading + error overlays. */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: #000;
      z-index: 30;
      transition: opacity 0.4s ease;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      max-width: 420px;
    }
    #error h2 { margin: 0 0 8px; font-size: 18px; }
    #error p { margin: 0; color: #aaa; font-size: 14px; line-height: 1.5; }
    #error code {
      color: var(--accent);
      word-break: break-all;
    }

    /* ── Always-on centered branding ───────────────────────────── */
    #brand {
      position: fixed;
      inset: 0;
      z-index: 15;               /* over video, under loading overlay */
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      pointer-events: none;      /* let scroll/touch pass through */
    }
    /* Soft spotlight so text stays legible over any frame. */
    #brand::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 55% at 50% 50%,
        rgba(0, 0, 0, 0.55) 0%,
        rgba(0, 0, 0, 0.25) 45%,
        transparent 75%
      );
    }
    .brand-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(18px, 3vh, 30px);
      animation: floaty 6s ease-in-out infinite;
    }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    .title {
      margin: 0;
      font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      font-size: clamp(2.6rem, 12vw, 6rem);
      line-height: 0.95;
      letter-spacing: 0.01em;
      background: linear-gradient(180deg, #ffffff 0%, #cfeee9 40%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 28px rgba(79, 209, 197, 0.45))
              drop-shadow(0 4px 18px rgba(0, 0, 0, 0.6));
    }
    .title span { display: block; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px 14px;
      font-family: "Space Grotesk", -apple-system, sans-serif;
    }
    .chip {
      pointer-events: auto;       /* re-enable clicks on the links */
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      font-size: clamp(12px, 2.6vw, 15px);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35);
      transition: transform 0.2s ease, border-color 0.2s ease,
                  background 0.2s ease, box-shadow 0.2s ease;
    }
    .chip:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: rgba(79, 209, 197, 0.14);
      box-shadow: 0 8px 28px rgba(79, 209, 197, 0.35);
    }
    .chip svg { width: 14px; height: 14px; fill: currentColor; flex: none; }
    .chip .hash { color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>
  <div id="progress"><div id="progress-fill"></div></div>

  <div id="scroll-track">
    <div id="stage">
      <video
        id="scrub-video"
        playsinline
        webkit-playsinline
        muted
        preload="auto"
      ></video>
    </div>
  </div>

  <div id="brand">
    <div class="brand-inner">
      <h1 class="title"><span>Xi Rong</span><span>Project</span></h1>
      <div class="meta">
        <a class="chip" href="https://www.whif.io" target="_blank" rel="noopener">www.whif.io</a>
        <a class="chip" href="https://x.com/hashtag/XiRongProject" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          <span class="hash">#XiRongProject</span>
        </a>
        <a class="chip" href="https://x.com/NoHoneyBonk" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          By @NoHoneyBonk
        </a>
      </div>
    </div>
  </div>

  <div id="hint">Scroll to play ↓</div>

  <div id="overlay">
    <div id="loader">
      <div class="spinner"></div>
      <div>Loading video…</div>
    </div>
    <div id="error">
      <h2>Couldn't load the video</h2>
      <p>
        Check that <code id="error-src"></code> exists and is reachable.
        On GitHub Pages, large files may need
        <a href="https://git-lfs.com" style="color:var(--accent)">Git LFS</a>
        or external hosting with CORS enabled.
      </p>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // Swap this out for your own video. Relative path (same repo) or
    // a full URL. For scrubbing to work cross-origin, the host must
    // send permissive CORS headers.
    const VIDEO_SRC = "video.mp4";
    // ─────────────────────────────────────────────────────────────

    const video    = document.getElementById("scrub-video");
    const fill      = document.getElementById("progress-fill");
    const hint      = document.getElementById("hint");
    const overlay   = document.getElementById("overlay");
    const loader    = document.getElementById("loader");
    const errorBox  = document.getElementById("error");
    const errorSrc  = document.getElementById("error-src");

    errorSrc.textContent = VIDEO_SRC;
    video.src = VIDEO_SRC;

    let duration   = 0;     // total seconds of footage
    let targetTime = 0;     // where scroll wants the playhead
    let currentTime = 0;    // smoothed playhead we actually apply
    let ready      = false;
    let rafId      = null;

    // Map scroll position (0 → bottom of the track) onto [0, 1].
    function scrollProgress() {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      if (max <= 0) return 0;
      return Math.min(1, Math.max(0, window.scrollY / max));
    }

    function onScroll() {
      if (!ready) return;
      const p = scrollProgress();
      targetTime = p * duration;
      fill.style.width = (p * 100).toFixed(2) + "%";
      if (p > 0.02) hint.classList.add("hidden");
      else hint.classList.remove("hidden");
      trackScroll(p);
      startLoop();
    }

    // Fire a GA4 event the first time the viewer scrubs past each
    // milestone, so you can see how far people actually watch.
    const milestones = [0.25, 0.5, 0.75, 1];
    const hitMilestones = new Set();
    function trackScroll(p) {
      if (typeof gtag !== "function") return;
      for (const m of milestones) {
        if (p >= m - 0.001 && !hitMilestones.has(m)) {
          hitMilestones.add(m);
          const pct = Math.round(m * 100);
          gtag("event", "video_progress", { percent: pct, value: pct });
        }
      }
    }

    let pendingSeek = false; // a frame wanted to seek while one was in flight

    // Ease the displayed time toward the scroll target so fast flicks
    // don't snap. Stops itself once it's close enough to idle.
    function tick() {
      const diff = targetTime - currentTime;
      if (Math.abs(diff) < 0.005) {
        currentTime = targetTime;
        applyTime();
        rafId = null;
        return;
      }
      currentTime += diff * 0.18; // smoothing factor
      applyTime();
      rafId = requestAnimationFrame(tick);
    }

    function applyTime() {
      if (video.readyState < 1) return;
      // Never stack a new seek on top of one still decoding — on mobile that
      // backs up the decoder and causes the stutter. Defer and re-fire once
      // the in-flight seek reports done (see the "seeked" handler).
      if (video.seeking) { pendingSeek = true; return; }
      // Guard against seeking past the very end (can stall on some browsers).
      const t = Math.min(currentTime, Math.max(0, duration - 0.05));
      if (Math.abs(video.currentTime - t) > 0.001) {
        try { video.currentTime = t; } catch (_) {}
      }
    }

    // When a seek finishes, immediately apply the latest target if scroll
    // moved on while we were waiting. Keeps playback glued to the finger.
    video.addEventListener("seeked", () => {
      if (pendingSeek) { pendingSeek = false; applyTime(); }
    });

    function startLoop() {
      if (rafId == null) rafId = requestAnimationFrame(tick);
    }

    // ── Lifecycle / events ──────────────────────────────────────
    video.addEventListener("loadedmetadata", () => {
      duration = video.duration || 0;
      ready = true;
      overlay.classList.add("hidden");
      onScroll(); // sync to wherever we already are
    });

    video.addEventListener("error", showError);
    // If metadata never arrives within a reasonable window, surface the error.
    const watchdog = setTimeout(() => { if (!ready) showError(); }, 15000);
    video.addEventListener("loadedmetadata", () => clearTimeout(watchdog));

    function showError() {
      loader.style.display = "none";
      errorBox.style.display = "block";
      overlay.classList.remove("hidden");
    }

    // Passive listeners keep touch scrolling smooth on mobile.
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll, { passive: true });

    // Report which brand link people tap.
    document.querySelectorAll(".chip").forEach((a) => {
      a.addEventListener("click", () => {
        if (typeof gtag === "function") {
          gtag("event", "link_click", {
            link_url: a.href,
            link_text: a.textContent.trim().replace(/\s+/g, " "),
          });
        }
      });
    });

    // Some mobile browsers won't fetch until a play attempt; this nudges
    // buffering without actually starting playback.
    video.load();
    video.play().then(() => video.pause()).catch(() => {});
  </script>
</body>
</html>
