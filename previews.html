<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Video Preview · Xi Rong Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

  <!-- ── Google Analytics 4 (same property as the landing page) ── -->
  <script>
    window.GA_ID = "G-16F3PRWRP6";
    (function (id) {
      if (!id || id.indexOf("G-") !== 0) return;
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () { dataLayer.push(arguments); };
      gtag("js", new Date());
      gtag("config", id);
      var s = document.createElement("script");
      s.async = true;
      s.src = "https://www.googletagmanager.com/gtag/js?id=" + id;
      document.head.appendChild(s);
    })(window.GA_ID);
  </script>

  <style>
    :root {
      --accent: #4fd1c5;
      --thai: "IBM Plex Sans Thai", "Noto Sans Thai";
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: var(--thai), -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle moving glow behind everything so the grid doesn't feel flat. */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 60% 50% at 20% 0%, rgba(79, 209, 197, 0.14), transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(79, 209, 197, 0.08), transparent 60%);
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: clamp(20px, 5vw, 48px) clamp(16px, 4vw, 32px) 80px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: clamp(20px, 4vw, 36px);
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .back:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: rgba(79, 209, 197, 0.14);
    }

    .titles { text-align: center; flex: 1; min-width: 220px; }
    .kicker {
      margin: 0 0 6px;
      font-family: "Space Grotesk", var(--thai), sans-serif;
      font-size: clamp(0.66rem, 2.4vw, 0.82rem);
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 14px rgba(79, 209, 197, 0.5);
    }
    h1 {
      margin: 0;
      font-family: "Space Grotesk", var(--thai), sans-serif;
      font-weight: 700;
      font-size: clamp(1.8rem, 6vw, 3rem);
      line-height: 1;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, #ffffff 0%, #cfeee9 45%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 24px rgba(79, 209, 197, 0.4));
    }

    /* Language switcher (mirrors the landing page) */
    #lang-switch {
      display: flex;
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .lang {
      padding: 0; width: 26px; height: 26px;
      border: 0; border-radius: 50%;
      background: none; cursor: pointer; overflow: hidden;
      opacity: 0.5; filter: grayscale(0.5);
      transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    .lang img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .lang:hover { opacity: 0.9; transform: translateY(-1px); }
    .lang.active {
      opacity: 1; filter: none;
      box-shadow: 0 0 0 2px var(--accent), 0 0 12px rgba(79, 209, 197, 0.6);
    }

    /* ── Preview grid ───────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: clamp(16px, 3vw, 26px);
    }

    .card {
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.035);
      backdrop-filter: blur(6px);
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card.live:hover {
      transform: translateY(-3px);
      border-color: rgba(79, 209, 197, 0.5);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .pv-label { display: flex; flex-direction: column; gap: 2px; }
    .pv-tag {
      font-family: "Space Grotesk", var(--thai), sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #b794f4;
    }
    .pv-no {
      font-family: "Space Grotesk", var(--thai), sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      color: #fff;
    }
    .badge {
      font-family: "Space Grotesk", var(--thai), sans-serif;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .badge.new {
      color: #03100e;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(79, 209, 197, 0.5);
    }
    .badge.bgm {
      color: #100a1e;
      background: #b794f4;
      box-shadow: 0 0 14px rgba(183, 148, 244, 0.5);
    }
    .badge.locked {
      color: #9fb7b3;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    /* X embed sits in the card body. Twitter's widget styles itself. */
    .embed { padding: 4px 10px 10px; }
    .embed .twitter-tweet { margin: 8px auto !important; }

    /* While the X widget hydrates, show a fallback link/spinner. */
    .embed-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 30px 16px;
      text-align: center;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid rgba(255, 255, 255, 0.18);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .embed-fallback a { color: var(--accent); text-decoration: none; font-size: 14px; }

    /* ── Locked cards ───────────────────────────────────────────── */
    .card.locked {
      min-height: 220px;
      display: flex;
      flex-direction: column;
    }
    .lock-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 28px 18px;
      text-align: center;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(255, 255, 255, 0.018) 0 14px,
          transparent 14px 28px
        );
    }
    .lock-icon {
      width: 42px; height: 42px;
      opacity: 0.7;
      color: #9fb7b3;
    }
    .lock-text {
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      color: #9fb7b3;
    }

    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 13px;
      color: #6f8480;
      letter-spacing: 0.04em;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="back" href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span data-i18n="back">Back</span>
      </a>

      <div class="titles">
        <p class="kicker" data-i18n="kicker">Video Preview</p>
        <h1 data-i18n="title">PREVIEWS</h1>
      </div>

      <div id="lang-switch" role="group" aria-label="Language">
        <button class="lang" data-lang="th" title="ไทย"><img src="https://flagcdn.com/th.svg" alt="ไทย" /></button>
        <button class="lang" data-lang="en" title="English"><img src="https://flagcdn.com/us.svg" alt="English" /></button>
        <button class="lang" data-lang="ja" title="日本語"><img src="https://flagcdn.com/jp.svg" alt="日本語" /></button>
        <button class="lang" data-lang="ko" title="한국어"><img src="https://flagcdn.com/kr.svg" alt="한국어" /></button>
        <button class="lang" data-lang="zh" title="繁體中文"><img src="https://flagcdn.com/tw.svg" alt="繁體中文" /></button>
      </div>
    </header>

    <main class="grid" id="grid"></main>

    <footer>
      <span data-i18n="footer">More previews unlock as release approaches.</span>
      &nbsp;·&nbsp;
      <a href="https://x.com/NoHoneyBonk" target="_blank" rel="noopener">@NoHoneyBonk</a>
    </footer>
  </div>

  <script>
    // ── The previews. Live ones point at an X status; locked ones don't. ──
    const PREVIEWS = [
      { no: "PV 01", url: "https://x.com/NoHoneyBonk/status/2066506016439832740" },
      { no: "PV 02", url: "https://x.com/NoHoneyBonk/status/2066868395409301951" },
      { no: "PV 03", url: "https://x.com/NoHoneyBonk/status/2067230787213434888" },
      { no: "PV 04", url: "https://x.com/NoHoneyBonk/status/2067593169483817033" },
      { no: "PV 05", url: "https://x.com/NoHoneyBonk/status/2067955557453930625" },
      { no: "PV 06", url: "https://x.com/NoHoneyBonk/status/2068680343226548673" },
      { no: "PV 07", url: "https://x.com/NoHoneyBonk/status/2069042730227974633" },
      { no: "PV 08", url: "https://x.com/NoHoneyBonk/status/2069405119850963154" },
      { no: "PV 09", url: "https://x.com/NoHoneyBonk/status/2069767508144308458" },
      { no: "PV 10", url: "https://x.com/NoHoneyBonk/status/2070129894659354799", badge: "new" },
      { no: "BGM", url: "https://x.com/NoHoneyBonk/status/2068317947735552432", tag: "extra", badge: "bgm" },
      { no: "PV 11" }, { no: "PV 12" },
    ];

    const LOCK_SVG =
      '<svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
      '<rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>';

    const grid = document.getElementById("grid");

    PREVIEWS.forEach((pv) => {
      const card = document.createElement("section");
      if (pv.url) {
        card.className = "card live";
        const tagHtml = pv.tag
          ? '<span class="pv-tag" data-i18n="tag_' + pv.tag + '">Extra</span>' : '';
        const badgeHtml = pv.badge === "bgm"
          ? '<span class="badge bgm">♪ BGM</span>'
          : pv.badge === "new"
          ? '<span class="badge new" data-i18n="badge_new">New</span>'
          : '';
        card.innerHTML =
          '<div class="card-head">' +
            '<span class="pv-label">' + tagHtml + '<span class="pv-no">' + pv.no + '</span></span>' +
            badgeHtml +
          '</div>' +
          '<div class="embed">' +
            '<div class="embed-fallback">' +
              '<div class="spinner"></div>' +
              '<a href="' + pv.url + '" target="_blank" rel="noopener" data-i18n="open_x">Open on X →</a>' +
            '</div>' +
            '<blockquote class="twitter-tweet" data-theme="dark" data-dnt="true" data-media-max-width="560">' +
              '<a href="' + pv.url + '"></a>' +
            '</blockquote>' +
          '</div>';
      } else {
        card.className = "card locked";
        card.innerHTML =
          '<div class="card-head">' +
            '<span class="pv-no">' + pv.no + '</span>' +
            '<span class="badge locked" data-i18n="badge_locked">Locked</span>' +
          '</div>' +
          '<div class="lock-body">' +
            LOCK_SVG +
            '<span class="lock-text" data-i18n="coming_soon">Coming soon</span>' +
          '</div>';
      }
      grid.appendChild(card);
    });

    // ── Load X widgets.js, then render the embedded tweets. ──
    // X inserts each tweet's <iframe> asynchronously (and may auto-scan before
    // any event we bind). A MutationObserver reliably drops a card's spinner/
    // fallback the moment its iframe appears, no matter the render timing.
    // Cards that never render keep their "Open on X" link as a graceful fallback.
    (function loadTwitter() {
      function sweep() {
        let remaining = 0;
        grid.querySelectorAll(".embed").forEach(function (em) {
          if (em.querySelector("iframe")) {
            const fb = em.querySelector(".embed-fallback");
            if (fb) fb.remove();
          } else if (em.querySelector(".embed-fallback")) {
            remaining++;
          }
        });
        if (remaining === 0) obs.disconnect();
      }
      const obs = new MutationObserver(sweep);
      obs.observe(grid, { childList: true, subtree: true });

      const s = document.createElement("script");
      s.src = "https://platform.twitter.com/widgets.js";
      s.async = true;
      s.charset = "utf-8";
      s.onload = function () {
        if (window.twttr && window.twttr.widgets) window.twttr.widgets.load(grid);
        sweep();
      };
      document.body.appendChild(s);
    })();

    // ── i18n (default Thai; choice shared with the landing page) ──
    const I18N = {
      th: { back: "กลับ", kicker: "ตัวอย่างวิดีโอ", title: "ตัวอย่าง", badge_new: "ใหม่", badge_locked: "ล็อก", tag_extra: "พิเศษ", coming_soon: "เร็ว ๆ นี้", open_x: "เปิดใน X →", footer: "ตัวอย่างเพิ่มเติมจะปลดล็อกเมื่อใกล้วันปล่อย" },
      en: { back: "Back", kicker: "Video Preview", title: "PREVIEWS", badge_new: "New", badge_locked: "Locked", tag_extra: "Extra", coming_soon: "Coming soon", open_x: "Open on X →", footer: "More previews unlock as release approaches." },
      ja: { back: "戻る", kicker: "ビデオプレビュー", title: "プレビュー", badge_new: "新着", badge_locked: "ロック", tag_extra: "特典", coming_soon: "近日公開", open_x: "X で開く →", footer: "公開が近づくとプレビューが追加されます" },
      ko: { back: "뒤로", kicker: "비디오 미리보기", title: "미리보기", badge_new: "신규", badge_locked: "잠김", tag_extra: "특별", coming_soon: "출시 예정", open_x: "X에서 열기 →", footer: "출시가 가까워지면 미리보기가 추가됩니다" },
      zh: { back: "返回", kicker: "影片預覽", title: "預覽", badge_new: "最新", badge_locked: "鎖定", tag_extra: "額外", coming_soon: "即將推出", open_x: "在 X 開啟 →", footer: "隨著上線臨近將解鎖更多預覽" },
    };

    const DEFAULT_LANG = "th";
    const langButtons = Array.from(document.querySelectorAll(".lang"));

    function applyLang(lang) {
      const dict = I18N[lang] || I18N[DEFAULT_LANG];
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const v = dict[el.dataset.i18n];
        if (v != null) el.textContent = v;
      });
      document.documentElement.lang = lang;
      langButtons.forEach((b) => b.classList.toggle("active", b.dataset.lang === lang));
      try { localStorage.setItem("xr_lang", lang); } catch (_) {}
    }

    langButtons.forEach((b) => {
      b.addEventListener("click", () => {
        applyLang(b.dataset.lang);
        if (typeof gtag === "function") gtag("event", "language_select", { language: b.dataset.lang });
      });
    });

    let savedLang = DEFAULT_LANG;
    try { savedLang = localStorage.getItem("xr_lang") || DEFAULT_LANG; } catch (_) {}
    applyLang(I18N[savedLang] ? savedLang : DEFAULT_LANG);
  </script>
</body>
</html>
